<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Assist</title>
  <link rel="icon" type="image/x-icon" href="/images/394.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    input[type="text"] { width: 400px; }
    .radio-group, .provider-block .radio-group { display: flex; gap: 1rem; align-items: center; }
    .clear-btn { margin: 10px 0 20px 0; background-color: #e74c3c; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; }
    .clear-btn:hover { background-color: #c0392b; }
    .error { color: red; font-size: 0.9rem; margin-left: 0.5rem; }
    .inline-copy { display: flex; align-items: center; gap: 0.5rem; }
    .parser-box { resize: both; min-width: 600px; min-height: 150px; width: 100%; padding: 8px; margin-bottom: 1rem; }
    .output-box { resize: both; min-width: 600px; min-height: 150px; width: 100%; padding: 8px; }
    .provider-block { margin-bottom: 25px; border: 1px solid #ccc; padding: 15px; background: #fff; border-radius: 8px; }
    .output-row { display: flex; align-items: center; gap: 10px; }
  </style>
</head>
<body>
  <nav class="main-nav">
    <div class="nav-container">
      <a href="order.html" class="nav-link">New Order</a>
      <a href="reorder.html" class="nav-link">Reorder</a>
      <a href="assist.html" class="nav-link active">Assist</a>
    </div>
  </nav>

  <h2>UE Assist Command Formatter</h2>
  <button class="clear-btn" onclick="clearAll()">Clear All</button>

  <!-- Parser -->
  <div class="parser-box form-section">
    <label>Paste Form Here:</label>
    <textarea id="formInput" placeholder="Paste ticket form here..."></textarea>
    <div class="parse-btn-container">
      <button class="parse-btn" onclick="parseFormInput()">Parse</button>
    </div>
  </div>

  <!-- Required Fields -->
  <div class="form-section">
    <label>Group Link:</label>
    <input type="text" id="groupLink" oninput="updateCommand()">
    <span id="linkError" class="error"></span>
  </div>

  <div class="form-section">
    <label>Identifier:</label>
    <div class="radio-group">
      <label><input type="radio" name="identifier" value="Select" checked onchange="updateCommand()"> Select</label>
      <label><input type="radio" name="identifier" value="Any" onchange="updateCommand()"> Any</label>
    </div>
  </div>

  <!-- Provider-based Card Info -->
  <div class="provider-block">
    <label>Card Number:</label>
    <input type="text" id="cardNumber" oninput="updateCommand()" maxlength="16">
    <span id="cardError" class="error"></span>

    <label>CVV:</label>
    <input type="text" id="cvv" oninput="updateCommand()" maxlength="3">
    <span id="cvvError" class="error"></span>

    <div class="radio-group">
      <span>Card Provider:</span>
      <label><input type="radio" name="provider" value="AG" onchange="updateCommand()"> AG</label>
      <label><input type="radio" name="provider" value="TG" onchange="updateCommand()"> TG</label>
      <label><input type="radio" name="provider" value="HG" onchange="updateCommand()"> HG</label>
      <label><input type="radio" name="provider" value="Cap1" onchange="updateCommand()"> Cap1</label>
    </div>
  </div>

  <!-- Overrides -->
  <div class="form-section">
    <label>Name:</label>
    <input type="text" id="overrideName" oninput="updateCommand()">
    <span id="nameError" class="error"></span>
  </div>

  <div class="form-section">
    <label>Address Line 2:</label>
    <input type="text" id="overrideApt" oninput="updateCommand()">
    <span id="aptError" class="error"></span>
  </div>

  <div class="form-section">
    <label>Delivery Notes:</label>
    <input type="text" id="overrideNotes" oninput="updateCommand()">
  </div>

  <div class="form-section">
    <label class="checkbox-label">
      <input type="checkbox" id="leaveAtDoor" onchange="updateCommand()">
      Dropoff: Leave at Door
    </label>
  </div>

  <!-- Output -->
  <div class="form-section output-row">
    <textarea id="commandOutput" class="output-box" readonly></textarea>
    <button class="copy-btn" onclick="copyToClipboard('commandOutput')">Copy</button>
  </div>

  <script>
    const providerData = {
      AG:   { month: "04", year: "28", zip: "19104" },
      TG:   { month: "04", year: "28", zip: "07724" },
      HG:   { month: "04", year: "28", zip: "07724" },
      Cap1: { month: "06", year: "30", zip: "19104" }
    };

    const leavePattern = /\bleave(?:\s+at(?:\s+the)?\s+door)?\b/i;

    function parseFormInput() {
      const lines = document.getElementById('formInput').value
        .trim().split('\n').map(l => l.trim().replace(/:$/, ''));

      const map = {
        'Group Cart Link': 'groupLink',
        'Name':            'overrideName',
        'Address Line 2':  'overrideApt',
        'Delivery Notes':  'overrideNotes'
      };

      for (let i = 0; i < lines.length - 1; i++) {
        const key = lines[i], val = lines[i+1];
        if (map[key] && val && val !== 'N/A') {
          document.getElementById(map[key]).value = val;
          i++;
        }
      }

      // comma→space for "Last, First"
      const nf = document.getElementById('overrideName');
      if (/^[^,]+,\s*[^,]+$/.test(nf.value)) {
        nf.value = nf.value.replace(/,\s*/, ' ');
      }

      updateCommand();
      document.getElementById('overrideNotes').dispatchEvent(new Event('input'));
    }

    function isValidUrl(url) {
      try { new URL(url); return true; } catch { return false; }
    }
    function isValidCardNumber(n) { return /^\d{16}$/.test(n); }
    function isValidCVV(v)        { return /^\d{3}$/.test(v);    }
    function isValidText(t)       { return /^[a-zA-Z0-9_@.\-\s]*$/.test(t); }

    function updateCommand() {
      const link  = document.getElementById('groupLink').value.trim();
      const card  = document.getElementById('cardNumber').value.trim();
      const cvv   = document.getElementById('cvv').value.trim();
      const name  = document.getElementById('overrideName').value.trim();
      const apt   = document.getElementById('overrideApt').value.trim();
      const notes = document.getElementById('overrideNotes').value.trim();

      if (leavePattern.test(notes)) {
        document.getElementById('leaveAtDoor').checked = true;
      }
      const leave = document.getElementById('leaveAtDoor').checked;

      let identifier = 'Select';
      for (const r of document.getElementsByName('identifier')) {
        if (r.checked) { identifier = r.value; break; }
      }

      let provider = '';
      for (const p of document.getElementsByName('provider')) {
        if (p.checked) { provider = p.value; break; }
      }

      ['linkError','cardError','cvvError','nameError','aptError']
        .forEach(id => document.getElementById(id).innerText = '');

      let ok = true;
      if (!link || !isValidUrl(link)) {
        document.getElementById('linkError').innerText = 'Valid group link required'; ok = false;
      }
      if (!isValidCardNumber(card)) {
        document.getElementById('cardError').innerText = '16 digits'; ok = false;
      }
      if (!isValidCVV(cvv)) {
        document.getElementById('cvvError').innerText = '3 digits'; ok = false;
      }
      if (name && !isValidText(name)) {
        document.getElementById('nameError').innerText = 'Letters/numbers/_@.- only'; ok = false;
      }
      if (apt && !isValidText(apt)) {
        document.getElementById('aptError').innerText = 'No special chars'; ok = false;
      }
      if (!providerData[provider]) ok = false;
      if (!ok) {
        document.getElementById('commandOutput').value = '';
        return;
      }

      const { month, year, zip } = providerData[provider];
      let cmd = `/assist order order_details:${link},${card},${month},${year},${cvv},${zip}`;
      cmd += ` identifier:${identifier}`;
      if (name)  cmd += ` override_name:${name}`;
      if (leave) cmd += ` override_dropoff:Leave at Door`;
      if (apt)   cmd += ` override_aptorsuite:${apt}`;
      if (notes) cmd += ` override_notes:${notes}`;

      document.getElementById('commandOutput').value = cmd;
    }

    document.getElementById('overrideNotes')
      .addEventListener('input', () => updateCommand());

    function copyToClipboard(id) {
      const el = document.getElementById(id);
      el.select(); document.execCommand('copy');
      const btn = document.querySelector(`button[onclick="copyToClipboard('${id}')"]`);
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 3000);
    }

    function clearAll() {
      ['formInput','groupLink','cardNumber','cvv','overrideName','overrideApt','overrideNotes']
        .forEach(i => document.getElementById(i).value = '');
      for (const p of document.getElementsByName('provider')) p.checked = false;
      document.getElementById('leaveAtDoor').checked = false;
      document.getElementById('commandOutput').value = '';
      ['linkError','cardError','cvvError','nameError','aptError']
        .forEach(id => document.getElementById(id).innerText = '');
    }
  </script>
</body>
</html>
